name: Login Sai

on:
  push:
    branches:
      - main

jobs:
  login-sai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Login Sai
        run: mvn test -Dtest=LoginTest#loginSai